syntax = "proto3";

package kms.api.cmk.registry.system.v1;

import "kms/api/cmk/types/v1/status.proto";
import "google/protobuf/timestamp.proto";

service Service {
  rpc RegisterSystem(RegisterSystemRequest) returns (RegisterSystemResponse) {}
  rpc ListSystems(ListSystemsRequest) returns (ListSystemsResponse) {}
  rpc DeleteSystem(DeleteSystemRequest) returns (DeleteSystemResponse) {}
  rpc UpdateSystemL1KeyClaim(UpdateSystemL1KeyClaimRequest) returns (UpdateSystemL1KeyClaimResponse) {}
  rpc UpdateSystemStatus(UpdateSystemStatusRequest) returns (UpdateSystemStatusResponse) {}
  rpc SetSystemLabels(SetSystemLabelsRequest) returns (SetSystemLabelsResponse) {}
  rpc RemoveSystemLabels(RemoveSystemLabelsRequest) returns (RemoveSystemLabelsResponse) {}
}

message System {
  string external_id = 1;
  string tenant_id = 2;
  string l2key_id = 3;
  bool has_l1key_claim = 4;
  string region = 5;
  string type = 6;

  // as metadata
  repeated Scope1 op1_scopes = 7;
  repeated Scope2 op2_scopes = 8;
  Scope3 op3_scopes = 9;

  kms.api.cmk.types.v1.Status status = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Timestamp created_at = 12;
  map<string, string> labels = 13;
}

// ----------------  Scope1  ------------------------

// Represents a not set-level request
message Scope1 {
  oneof value {
    SystemType system = 2;
    SubAccountType subaccount = 3;
    AccountType account = 4;
  }
}

// Represents a system-level request
message SystemType {
  optional string id = 1;
}

// Represents Global Tenant request
message GlobalTenantType {
  optional string id = 1;
}

// Represents a subaccount-level request
message SubAccountType {
  optional string id = 1;
}

// Represents an account-level request
message AccountType {
  optional string id = 1;
}


// -------------   Scope2  ------------------
message Scope2 {
  ScopeType type = 1;
  string id = 2;
}

enum ScopeType {
  SCOPE_TYPE_UNSPECIFIED = 0;
  SCOPE_TYPE_SYSTEM = 1;
  SCOPE_TYPE_GLOBAL_TENANT = 2;
  SCOPE_TYPE_SUBACCOUNT = 3;
  SCOPE_TYPE_ACCOUNT = 4;
}

// -------------   Scope3  ------------------

message Scope3 {
  oneof op3_scopes {
    GlobalTenantSubaccountMetadata global_tenant_subaccount = 1;
    SystemAccountMetadata system_account = 2;
  }
}

message SystemAccountMetadata {
  SystemAccountSystemType system_type = 1;

  enum SystemAccountSystemType {
    SYSTEM_TYPE_UNSPECIFIED = 0;
    SYSTEM = 1;
    ACCOUNT = 2;
  }
}

message GlobalTenantSubaccountMetadata {
  GlobalTenantSubaccountSystemType system_type = 1;

  enum GlobalTenantSubaccountSystemType {
    SYSTEM_TYPE_UNSPECIFIED = 0;
    GTID = 1;
    SUBACCOUNT = 2;
  }
}

// ----------------------------------------

message RegisterSystemRequest {
  string external_id = 1;
  string tenant_id = 2;
  string l2key_id = 3;
  bool has_l1key_claim = 4;
  string region = 5;
  kms.api.cmk.types.v1.Status status = 7;
  string type = 8;
  map<string, string> labels = 9;
}

message RegisterSystemResponse {
  bool success = 1;
}

message ListSystemsRequest {
  string external_id = 1;
  string region = 2;
  string tenant_id = 3;
  string type = 4;

  // Default value is 50.
  // Max value is 1000.
  int32 limit = 5;
  // Next page token.
  string page_token = 6;
}

message ListSystemsResponse {
  repeated System systems = 1;

  // Token of the next pagination page.
  string next_page_token = 2;
}

message DeleteSystemRequest {
  string external_id = 1;
  string region = 2;
  string type = 3;
}

message DeleteSystemResponse {
  bool success = 1;
}

message UpdateSystemL1KeyClaimRequest {
  string external_id = 1;
  string region = 2;
  string tenant_id = 3;
  bool l1key_claim = 4;
  string type = 5;
}

message UpdateSystemL1KeyClaimResponse {
  bool success = 1;
}

message UpdateSystemStatusRequest {
  string external_id = 1;
  string region = 2;
  kms.api.cmk.types.v1.Status status = 3;
  string type = 4;
}

message UpdateSystemStatusResponse {
  bool success = 1;
}

message SetSystemLabelsRequest {
  string external_id = 1;
  string region = 2;
  map<string, string> labels = 3;
  string type = 4;
}

message SetSystemLabelsResponse {
  bool success = 1;
}

message RemoveSystemLabelsRequest {
  string external_id = 1;
  string region = 2;
  repeated string label_keys = 3; // Keys of labels to delete
  string type = 4;
}

message RemoveSystemLabelsResponse {
  bool success = 1;
}