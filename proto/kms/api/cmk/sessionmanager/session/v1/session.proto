syntax = "proto3";

package kms.api.cmk.sessionmanager.session.v1;

import "kms/api/cmk/trust/v1/trust.proto";
import "kms/api/cmk/types/v1/oidc.proto";

option go_package = "github.com/openkcm/api-sdk/proto/kms/api/cmk/sessionmanager/session/v1;sessionv1";

service Service {
  // GetSession matches the fingerprint, tenant id, and returns a session
  // and its status. Additionally, the method checks whether the tenant is blocked.
  //
  // The method may return the following statuses with a rich error description (see kms.api.cmk.rpc.v1 package):
  // FailedPrecondition:
  //   PreconditionFailure:
  //     violations:
  //       type: "tenant_blocked"
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  // Deprecated: use GetTrust instead.
  rpc GetOIDCProvider(GetOIDCProviderRequest) returns (GetOIDCProviderResponse) {
    option deprecated = true;
  }
  rpc GetTrust(GetTrustRequest) returns (GetTrustResponse);
}

message GetSessionRequest {
  string session_id = 1;
  string tenant_id = 2;
  string fingerprint = 3;
}

message GetSessionResponse {
  bool valid = 1;
  string issuer = 2;
  string subject = 3;
  string given_name = 4;
  string family_name = 5;
  string email = 6;
  repeated string groups = 7;
  map<string, string> auth_context = 8;
}

message GetOIDCProviderRequest {
  string tenant_id = 1;
}

message GetOIDCProviderResponse {
  kms.api.cmk.types.v1.OIDCProvider provider = 1;
}

message GetTrustRequest {
  string tenant_id = 1;
}

message GetTrustResponse {
  kms.api.cmk.trust.v1.Trust trust = 1;
}
